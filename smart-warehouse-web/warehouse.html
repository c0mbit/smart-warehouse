<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Warehouse AI | Topology</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Smart Warehouse AI</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="order.html">Order Assembly</a></li>
                    <li class="nav-item"><a class="nav-link active" href="warehouse.html">Topology & AI</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>AI Slotting Optimization</h2>
            <div>
                <button id="clearGridBtn" class="btn btn-outline-danger btn-lg px-4 me-2">Clear Warehouse</button>
                <button id="runAiBtn" class="btn btn-primary btn-lg px-4">Run AI Analysis</button>
            </div>
        </div>
        <div id="summarySection" class="summary-box mb-4 d-none">
            <h5 class="text-primary mb-2">⚡ AI Report</h5>
            <p id="summaryText" class="mb-0 fs-5 text-light"></p>
        </div>
        <div class="rack-grid" id="rackGrid">
        </div>
    </div>

    <script>
        function drawEmptyGrid() {
            const grid = document.getElementById('rackGrid');
            grid.innerHTML = '';
            for(let i = 1; i <= 20; i++) {
                grid.innerHTML += `
                    <div class="rack-box">
                        <div class="rack-title">Rack ${i}</div>
                        <div class="product-name text-muted">Empty</div>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', drawEmptyGrid);

        document.getElementById('runAiBtn').addEventListener('click', async () => {
            const btn = document.getElementById('runAiBtn');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Analyzing...';
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:8000/api/ai/optimize-layout');
                const data = await response.json();

                if(data.status === 'success') {
                    document.getElementById('summarySection').classList.remove('d-none');
                    document.getElementById('summaryText').innerText = data.summary;

                    const grid = document.getElementById('rackGrid');
                    grid.innerHTML = '';
                    
                    data.layout.forEach(slot => {
                        const pairClass = slot.is_pair ? 'ai-paired' : '';
                        const textClass = slot.product === 'Empty' ? 'text-muted' : '';

                        grid.innerHTML += `
                            <div class="rack-box ${pairClass}">
                                <div class="rack-title">${slot.rack}</div>
                                <div class="product-name ${textClass}">${slot.product}</div>
                            </div>
                        `;
                    });
                } else {
                    alert('Analysis failed: ' + data.message);
                }
            } catch (error) {
                console.error("Failed to connect to AI service:", error);
                alert("Failed to connect to AI service. Please make sure it's running.");
            } finally {
                btn.innerHTML = 'Run AI Analysis';
                btn.disabled = false;
            }
        });

        function highlightGrid(index) {
    document.querySelectorAll(".grid-cell").forEach(cell => {
        cell.classList.remove("highlight-target", "highlight-adjacent");
    });

    const cellA = (index * 3) % 19 + 1; 
    let cellB = cellA + 1;
    
    document.getElementById(`cell-${cellA}`).classList.add("highlight-target");
    document.getElementById(`cell-${cellB}`).classList.add("highlight-adjacent");
}

        document.getElementById('clearGridBtn').addEventListener('click', async () => {
            const isConfirmed = confirm("Are you sure you want to delete your entire order history from the database? The items will remain, but your purchase history will be erased.");
            
            if (!isConfirmed) return;

            const btn = document.getElementById('clearGridBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Clearing DB...';
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:8080/api/orders/reset', {
                    method: 'DELETE'
                });

                if (response.ok) {
                    drawEmptyGrid(); 
                    document.getElementById('summarySection').classList.add('d-none'); 
                    alert("✅ Database cleared successfully! Order history is empty.");
                } else {
                    alert("❌ Error occurred while clearing the database.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("❌ Failed to connect to the Java server.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
    
    <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
</body>
</html>
