<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Warehouse AI | Order Assembly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

    <div id="header-placeholder"></div>

    <div class="container mt-5 flex-grow-1">
        <h2 class="mb-4">Create New Order</h2>
        
        <div class="row">
            <div class="col-md-5">
                <div class="card bg-secondary text-white shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Add Item to Cart</h5>
                        <form id="addItemForm">
                            <div class="mb-3">
                                <label for="productSelect" class="form-label">Select Product</label>
                                <select class="form-select" id="productSelect" required>
                                    <option value="" disabled selected>Loading products...</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="quantityInput" class="form-label">Quantity</label>
                                <input type="number" class="form-select" id="quantityInput" min="1" value="1" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Add to Order</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card bg-dark border border-secondary text-white shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Current Order: <span id="displayOrderNumber" class="text-warning"></span></h5>
                        <table class="table table-dark table-striped mt-3">
                            <thead>
                                <tr>
                                    <th>Product ID</th>
                                    <th>Product Name</th>
                                    <th>Quantity</th>
                                </tr>
                            </thead>
                            <tbody id="cartTableBody">
                            </tbody>
                        </table>
                        <button id="submitOrderBtn" class="btn btn-primary mt-3 w-100" disabled>Submit Order to Warehouse</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/components.js"></script>
    <script src="js/order.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
